<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API</title>
</head>
<body>
  <h1>GET & POST Requests</h1>

  <h2>GET Request</h2>
  <form action="http://localhost:5500/test" method="get">
    <div>
      <input type="text" name="username" placeholder="username">
      <input type="number" name="year" placeholder="year">
      <button>Submit</button>
    </div>
  </form>

  <h2>POST Request</h2>
  <form action="http://localhost:5500/test" method="post">
    <div>
      <input type="text" name="username" placeholder="username">
      <input type="number" name="year" placeholder="year">
      <button>Submit</button>
    </div>
  </form>
</body>
</html>
